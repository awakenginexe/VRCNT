name: Release VRCNT

on:
  push:
    tags:
      - 'v*' # Trigger when tag starts with 'v' (e.g. v1.0.2)

jobs:
  release:
    name: Build VRCNT
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install dependencies
        run: npm install

      - name: Setup Python environment
        run: npm run setup-python

      - name: Install Python script dependencies
        run: pip install tqdm

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          $TAG_WITH_V = $env:GITHUB_REF -replace "^refs/tags/", ""
          $VERSION_NUM = $TAG_WITH_V -replace "^v", ""
          echo "VERSION=$VERSION_NUM" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content -Raw ./package.json | ConvertFrom-Json).version
          if ($packageVersion -ne $env:VERSION) {
            throw "Tag $env:GITHUB_REF_NAME does not match package.json version $packageVersion. Use tag v$packageVersion or update package.json intentionally."
          }

      - name: Build and package
        run: npm run release

      - name: Locate NSIS installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path ./src-tauri/target/release/bundle/nsis -Filter "VRCNT_*_x64-setup.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            Get-ChildItem -Path ./src-tauri/target/release/bundle -Recurse -ErrorAction SilentlyContinue
            throw "NSIS installer was not generated."
          }

          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: AwakeNgineXE/VRCNT
          RELEASE_TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          pip install huggingface_hub==0.34.4

          $UPLOAD_DIR = "./hf_upload_temp"
          New-Item -ItemType Directory -Force -Path $UPLOAD_DIR
          Copy-Item -Path ./VRCNT.zip -Destination "$UPLOAD_DIR/VRCNT.zip"

          $script = @'
          import os
          from huggingface_hub import HfApi
          from huggingface_hub.errors import RevisionNotFoundError

          repo_id = os.environ["HF_REPO_ID"]
          token = os.environ["HF_TOKEN"]
          release_tag = os.environ["RELEASE_TAG"]
          version = os.environ["VERSION"]

          api = HfApi(token=token)
          commit_info = api.upload_folder(
              repo_id=repo_id,
              repo_type="model",
              folder_path="hf_upload_temp",
              commit_message=f"[Update] {version} Release",
          )

          try:
              api.delete_tag(repo_id=repo_id, repo_type="model", tag=release_tag, token=token)
              print(f"Deleted existing Hugging Face tag {release_tag}")
          except RevisionNotFoundError:
              pass

          api.create_tag(
              repo_id=repo_id,
              repo_type="model",
              tag=release_tag,
              revision=commit_info.oid,
              tag_message=f"Release {release_tag}",
              token=token,
          )
          print(f"Created Hugging Face tag {release_tag} at {commit_info.oid}")
          '@

          $script | python -

          $downloadUrl = "https://huggingface.co/$env:HF_REPO_ID/resolve/$env:RELEASE_TAG/VRCNT.zip"
          Invoke-WebRequest -Uri $downloadUrl -Method Head -MaximumRedirection 5 -UseBasicParsing

          "VRCNT_ZIP_URL=$downloadUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Remove-Item -Recurse -Force $UPLOAD_DIR

      - name: Verify installer payload URL
        shell: pwsh
        run: |
          $expectedUrl = "https://huggingface.co/AwakeNgineXE/VRCNT/resolve/v$env:VERSION/VRCNT.zip"
          if ($env:VRCNT_ZIP_URL -ne $expectedUrl) {
            throw "Installer payload URL mismatch. Expected $expectedUrl but got $env:VRCNT_ZIP_URL"
          }

          $template = Get-Content -Raw ./src-tauri/nsis/template.nsi
          if ($template -notmatch "https://huggingface\.co/AwakeNgineXE/VRCNT/resolve/v\$\{VERSION\}") {
            throw "NSIS template is not using the tagged Hugging Face release payload URL."
          }

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $env:VERSION --draft=false --prerelease=false
          } else {
            gh release create $tag --title $env:VERSION --notes "Release $tag" --verify-tag
          }

          gh release upload $tag "$env:INSTALLER_PATH" --clobber
